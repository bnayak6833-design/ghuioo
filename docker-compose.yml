version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# OpenTrain — local development stack
#
# Starts:
#   coordinator   FastAPI coordinator server  → http://localhost:8000
#   dashboard     Next.js web dashboard       → http://localhost:3000
#   worker-1      Demo volunteer worker node
#   worker-2      Demo volunteer worker node
#
# Usage:
#   docker compose up --build          # start everything
#   docker compose up coordinator      # coordinator only
#   docker compose scale worker=5      # spin up 5 workers
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Coordinator ─────────────────────────────────────────────────────────────
  coordinator:
    build:
      context: ./coordinator
      dockerfile: Dockerfile
    container_name: opentrain-coordinator
    ports:
      - "8000:8000"
    volumes:
      - coordinator-results:/app/results   # persist result artifacts across restarts
      - coordinator-db:/app                # persist SQLite DB
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Web Dashboard ────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
    container_name: opentrain-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_COORDINATOR_URL=http://localhost:8000
    depends_on:
      coordinator:
        condition: service_healthy
    restart: unless-stopped

  # ── Worker 1 ─────────────────────────────────────────────────────────────────
  worker-1:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: opentrain-worker-1
    command: ["--server", "http://coordinator:8000", "--token", "demo-token"]
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      coordinator:
        condition: service_healthy
    restart: unless-stopped

  # ── Worker 2 ─────────────────────────────────────────────────────────────────
  worker-2:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: opentrain-worker-2
    command: ["--server", "http://coordinator:8000", "--token", "demo-token"]
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      coordinator:
        condition: service_healthy
    restart: unless-stopped

volumes:
  coordinator-results:
  coordinator-db: